<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 云购优选</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register">
  <main class="phone-shell">
    <div class="status-bar"></div>
    <header class="app-header"><div class="header-row"><a class="back" href="login.html">‹</a><div class="page-title">用户注册</div><span style="width:34px"></span></div></header>
    <section class="content">
      <div class="form-card">
        <h2 style="margin-top:0">创建账号</h2><p class="muted">本页面用于展示前端表单结构与基础校验。</p>
        <form>
          <div class="input-group"><label>手机号</label><input required placeholder="请输入手机号"></div>
          <div class="input-group"><label>验证码</label><input required placeholder="请输入验证码"></div>
          <div class="input-group"><label>设置密码</label><input required type="password" placeholder="6-18 位密码"></div>
          <button class="btn block" type="submit">注册</button>
        </form>
        <p class="helper">已有账号？<a href="login.html">返回登录</a></p>
      </div>
    </section>
  </main>
  <script src="js/data.js"></script><script src="js/main.js"></script>
</body>
</html>
