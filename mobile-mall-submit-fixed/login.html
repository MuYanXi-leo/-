<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 云购优选</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
  <main class="phone-shell">
    <div class="status-bar"></div>
    <header class="app-header"><div class="header-row"><a class="back" href="index.html">‹</a><div class="page-title">账号登录</div><span style="width:34px"></span></div></header>
    <section class="content">
      <div class="form-card">
        <h2 style="margin-top:0">欢迎回来</h2><p class="muted">登录后可查看订单、购物车和收货地址。</p>
        <form>
          <div class="input-group"><label>手机号 / 用户名</label><input required placeholder="请输入账号"></div>
          <div class="input-group"><label>密码</label><input required type="password" placeholder="请输入密码"></div>
          <button class="btn block" type="submit">登录</button>
        </form>
        <p class="helper">还没有账号？<a href="register.html">立即注册</a></p>
      </div>
    </section>
  </main>
  <script src="js/data.js"></script><script src="js/main.js"></script>
</body>
</html>
